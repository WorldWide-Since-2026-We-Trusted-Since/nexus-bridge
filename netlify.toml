# Netlify Configuration for HNOSS Reference Governance System
# This file enables automatic deployment from GitHub to Netlify

[build]
  # Build command - uses npm instead of bun for Netlify compatibility
  command = "npm install && npm run build"
  publish = "dist"
  # Ignore changes to server/ folder for frontend-only deploys
  ignore = "git diff --quiet $COMMIT_REF $CACHED_COMMIT_REF -- . :!server/"

[build.environment]
  # Node.js version for build - MUST be 22+ for TanStack Start
  NODE_VERSION = "22"
  # Use npm for Netlify builds (not bun)
  NPM_FLAGS = "--legacy-peer-deps"
  # Force install to resolve peer deps
  NPM_CONFIG_LEGACY_PEER_DEPS = "true"
  # Install devDependencies (vite is needed for build)
  NPM_CONFIG_PRODUCTION = "false"
  # API URL - set this in Netlify UI Environment Variables
  # VITE_API_URL = "https://your-backend-url.com"

# ============================================
# SPA REDIRECT RULES - REQUIRED for TanStack Router
# ============================================
# All routes must go to index.html for client-side routing to work
# This is a rewrite (status 200), not a redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Exclude actual files and directories from the rewrite
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

# ============================================
# API PROXY (Optional - if backend is deployed)
# Uncomment and configure if you have a deployed backend
# ============================================
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.com/api/:splat"
#   status = 200
#   force = true

# ============================================
# SECURITY HEADERS
# ============================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # HSTS (enable after testing)
    # Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ============================================
# CACHING STRATEGY
# ============================================
# Cache static assets long-term
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html (SPA must be fresh)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# API responses - no cache
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ============================================
# DEPLOYMENT CONTEXTS
# ============================================
# Production context (main branch)
[context.production]
  environment = { NODE_ENV = "production" }

# Deploy Preview context (pull requests)
[context.deploy-preview]
  command = "npm install && npm run build"
  environment = { NODE_ENV = "development" }

# Branch Deploy context (other branches)
[context.branch-deploy]
  command = "npm install && npm run build"
  environment = { NODE_ENV = "development" }
